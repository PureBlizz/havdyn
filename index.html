<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <title>Havdyn</title>
  <!-- Poppins font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
	--blue-dark	: #1A4E5F;
	--blue-light: #4A8CA8;
	--green-dark: #3F5F47;
	--green-light: #A1D0B0;
    --gray-dark: #4A4D51;
    --gray: #A0A4A7;
    --gray-light: #EAECEC;
    }
    * { 
      box-sizing: border-box; 
      caret-color: transparent; /* Hide caret/cursor globally */
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--gray-light);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .placeholder-container {
      background: white;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* Align content to the top */
      min-height: 450px; /* Set a minimum height */
    }
    .logo-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex-grow: 1; /* Allow the logo and contact info to take available space */
    }
    .logo-bar {
      --logo-size: 4.5rem;
    }
    .logo-bar h1 {
      margin: 0;
      display: inline-flex;
      align-items: baseline;
      font-weight: 800;
      font-size: var(--logo-size);
      letter-spacing: 0.02em;
      color: var(--gray-dark);
      user-select: none;
    }
    .logo-bar .company-as {
      font-size: calc(var(--logo-size) * 0.322);
      font-weight: 400;
      color: var(--blue-light);
      margin-left: 0.3rem;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    @media (max-width: 768px) {
      .logo-bar { --logo-size: 3.5rem; }
    }
    @media (max-width: 480px) {
      .logo-bar { --logo-size: 2.5rem; }
    }
    .divider-container {
      display: flex;
      width: 100%;
      justify-content: space-between;
      margin-top: -0.3rem;
      margin-bottom: 0.5rem;
    }
    .divider {
      height: 1.2px;
      background-color: var(--blue-light);
      flex-grow: 1; /* Make both dividers grow to fill space */
    }
    .contact-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      column-gap: 2rem;
      row-gap: 1rem;
      font-size: 0.83rem;
      color: var(--gray-dark);
      margin-left: 0.4rem;
    }
    .contact-group {
      display: grid;
      row-gap: 0.75rem;
    }
    @media (max-width: 768px) {
      .contact-info {
        grid-template-columns: 1fr;
      }
    }
    .contact-item {
      display: flex;
      align-items: center;
      min-width: 180px; /* Ensure container is wide enough */
      min-height: 36px; /* Ensure container height is adequate for notification */
      position: relative;
    }
    .copy-btn {
      background: none;
      border: none;
      padding: 0.25rem;
      margin-right: 0.5rem;
      cursor: pointer;
      line-height: 0;
      color: var(--gray);
      transition: color 0.15s ease;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--blue-light); }
    .copy-btn:focus { outline: 2px solid var(--blue-light); outline-offset: 2px; }
    .copy-btn svg {
      width: 1.25rem;
      height: 1.25rem;
      stroke: currentColor;
      fill: none;

      margin-top: auto; /* Pushes the legal text to the bottom */
      margin-bottom: -0.8rem; /* Adds negative margin to pull the text closer to the bottom */
    }

    .new-divider {
      height: 1.2px;
      background-color: var(--blue-light);
      margin-top: 0.8rem; /* Adjust the top margin as needed */
      width: 100%;
    }
  </style>
</head>

      <div class="divider-container">
        <!-- Left Divider -->
        <div class="divider" id="left-divider"></div>
        <!-- Right Divider -->
        <div class="divider" id="right-divider"></div>
      </div>
      
      <div class="contact-info">
        <div class="contact-group">
          <!-- email -->
          <div class="contact-item">
            <button class="copy-btn" aria-label="Copy email">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

              </svg>
            </button>
            <div class="text" data-copy="post@havdyn.no">post@havdyn.no</div>
          </div>
          <!-- phone -->
          <div class="contact-item">
            <button class="copy-btn" aria-label="Copy phone number">

        </div>
        <div class="contact-group">
          <!-- address -->
          <div class="contact-item">
            <button class="copy-btn" aria-label="Copy address">

          </div>
          <!-- org/MVA number -->
          <div class="contact-item">
            <button class="copy-btn" aria-label="Copy organization number">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            <div class="text" data-copy="918894535">918&nbsp;894&nbsp;535&nbsp;MVA</div>
          </div>
        </div>
      </div>
      
      <!-- New Divider Underneath Contact Info -->
      <div class="new-divider"></div>

      <div class="additional-text">
        Havdyn er eid og drevet av Erlend Kvalsund. <br>Ta kontakt om det er noe jeg kan hjelpe deg med!
      </div>

      <div class="legal">© 2025 Havdyn AS</div>
    </div>
  </div>

  <!-- Notification container for "Copied!" -->
  <div class="notification-container"></div>

  <script>
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const txt = btn.nextElementSibling.getAttribute('data-copy');
        navigator.clipboard.writeText(txt).then(() => {
          const notif = document.createElement('div');
          notif.className = 'notification';
          notif.textContent = 'Copied!';
          document.querySelector('.notification-container').appendChild(notif);
